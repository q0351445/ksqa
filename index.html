<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运维知识库</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-top">
                <h1>运维知识库</h1>
                <div class="header-stats">
                    <span id="totalCount">加载中...</span>
                    <span id="updateTime"></span>
                </div>
            </div>
        </header>

        <!-- 工具栏 -->
        <div class="toolbar">
            <!-- 搜索栏 -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索问题描述或解决方法...">
                <button class="btn-search" id="searchBtn">搜索</button>
                <button class="btn-clear" id="clearBtn">重置</button>
            </div>

            <!-- 来源筛选 -->
            <div class="filter-box">
                <select id="sourceFilter">
                    <option value="">全部来源</option>
                </select>
            </div>

            <!-- 视图切换 -->
            <div class="view-toggle">
                <button data-view="table">表格</button>
                <button data-view="card">卡片</button>
            </div>

            <!-- 展示切换 -->
            <div class="display-toggle">
                <button data-display="compact">缩略</button>
                <button data-display="full">完整</button>
            </div>
        </div>

        <!-- 结果统计 -->
        <div class="result-info" id="resultCount">
            已加载 0 条
        </div>

        <!-- 数据列表 -->
        <div id="qaList" class="qa-list">
            <!-- 动态渲染 -->
        </div>

        <!-- 分页 -->
        <div id="pagination" class="pagination">
            <!-- 动态渲染 -->
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <span>正在加载...</span>
        </div>

        <!-- 错误提示 -->
        <div id="error" class="error" style="display:none;">
            <p>数据加载失败</p>
            <button onclick="location.reload()">重试</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
